name: CI Checks

on:
  push:
    branches:
      - main
      - features/*
  pull_request:
    branches:
      - main
      - features/*
  workflow_dispatch:

jobs:
  clang-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            python3 \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            liblua5.3-dev

      - name: Configure project
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -G Ninja

      - name: Get changed C/C++ files
        id: changed_files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              BASE=$(git rev-parse HEAD~1)
            else
              BASE=$(git rev-parse HEAD)
            fi
          fi

          git diff --name-only "$BASE" HEAD \
            | grep -E '\.(cpp|cc|cxx|hpp|h)$' \
            | grep -v '^third-party/' \
            | grep -v '^build/' > changed_files.txt || true

          echo "Changed files:"
          cat changed_files.txt || echo "(none)"

      - name: Run clang-format
        run: |
          if [ ! -s changed_files.txt ]; then
            echo "No C/C++ files to check for formatting"
            exit 0
          fi

          FAILED=0
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              echo "⚠️  Skipping deleted file: $file"
              continue
            fi
            if ! clang-format --dry-run --Werror "$file"; then
              echo "❌ $file has incorrect formatting"
              echo "--- Expected formatting diff ---"
              diff <(clang-format "$file") "$file" || true
              FAILED=1
            else
              echo "✅ $file is properly formatted"
            fi
          done < changed_files.txt

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Fix formatting by running: clang-format -i <file>"
            exit 1
          fi
          echo "✅ All files are properly formatted"

      - name: Run clang-tidy
        run: |
          if [ ! -s changed_files.txt ]; then
            echo "No C/C++ files changed for clang-tidy"
            exit 0
          fi

          FAILED=0
          while IFS= read -r file; do
            if [ ! -f "$file" ]; then
              echo "⚠️  Skipping deleted file: $file"
              continue
            fi
            echo "Checking: $file"
            if ! clang-tidy "$file" \
                -p build \
                --quiet \
                --warnings-as-errors='*'; then
              echo "❌ clang-tidy failed on $file"
              FAILED=1
            else
              echo "✅ $file passed clang-tidy"
            fi
          done < changed_files.txt

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "✅ All files passed clang-tidy"