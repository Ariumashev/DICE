name: CI Checks

on:
  push:
    branches:
      - main
      - features/*
  pull_request:
    branches:
      - main
      - features/*
  workflow_dispatch:

jobs:
  clang-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            python3 \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            liblua5.3-dev

      - name: Configure project
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja

      - name: Get changed C/C++ files
        id: changed_files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=$(git rev-parse HEAD~1)
          fi

          git diff --name-only $BASE HEAD \
            | grep -E '\.(cpp|cc|cxx|hpp|h)$' \
            | grep -v '^third-party/' > changed_files.txt || true

          echo "Changed files:"
          cat changed_files.txt || true

      - name: Run clang-format and clang-tidy
        run: |
          # ==== clang-format ====
          if [ -s changed_files.txt ]; then
            while read file; do
              echo "Checking format: $file"
              clang-format --style=file "$file" | diff -u "$file" - || exit 1
            done < changed_files.txt
          else
            echo "No C/C++ files changed for clang-format"
          fi

          # ==== clang-tidy ====
          wget -q https://raw.githubusercontent.com/llvm/llvm-project/main/clang-tools-extra/clang-tidy/tool/clang-tidy-diff.py

          if [ -s changed_files.txt ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE=${{ github.event.pull_request.base.sha }}
            else
              BASE=$(git rev-parse HEAD~1)
            fi

            git diff -U0 $BASE HEAD > diff.txt

            python3 clang-tidy-diff.py \
              -only-check-in-db \
              -header-filter='^(src|include)/' \
              < diff.txt
          else
            echo "No C/C++ files changed for clang-tidy"
          fi