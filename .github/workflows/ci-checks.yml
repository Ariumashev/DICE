name: CI Checks

on:
  push:
    branches:
      - main
      - features/*
  pull_request:
    branches:
      - main
      - features/*
  workflow_dispatch:

jobs:
  clang-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            python3 \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            liblua5.3-dev

      - name: Configure project
        run: |
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -G Ninja

      - name: Get changed C/C++ files
        id: changed_files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              BASE=$(git rev-parse HEAD~1)
            else
              BASE=$(git rev-parse HEAD)
            fi
          fi

          git diff --name-only $BASE HEAD \
            | grep -E '\.(cpp|cc|cxx|hpp|h)$' \
            | grep -v '^third-party/' > changed_files.txt || true

          echo "CHANGED_FILES=$(cat changed_files.txt)" >> $GITHUB_ENV
          echo "Changed files:"
          cat changed_files.txt || true

      # --- Run clang-format and clang-tidy ---
      - name: Run clang-format
        run: |
          if [ -s changed_files.txt ]; then
            echo "Checking formatting for changed files:"
            for file in $(cat changed_files.txt); do
              if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
                echo "❌ $file has incorrect formatting"
                clang-format "$file" | git diff --no-index --color "$file" - || true
                exit 1
              else
                echo "✅ $file is properly formatted"
              fi
            done
            echo "✅ All files are properly formatted"
          else
            echo "No C/C++ files to check for formatting"
          fi

      - name: Download clang-tidy-diff script
        run: |
          wget -q https://raw.githubusercontent.com/llvm/llvm-project/main/clang-tools-extra/clang-tidy/tool/clang-tidy-diff.py
          chmod +x clang-tidy-diff.py

      - name: Run clang-tidy on changed files
        run: |
          if [ -s changed_files.txt ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE=${{ github.event.pull_request.base.sha }}
            else
              BASE=$(git rev-parse HEAD~1)
            fi

            git diff -U0 $BASE HEAD > diff.txt

            if [ -s diff.txt ]; then
              echo "Running clang-tidy on changed lines:"
              python3 clang-tidy-diff.py \
                -p1 \
                -path build \
                -quiet \
                -use-color \
                -extra-arg=-std=c++17 \
                < diff.txt
            else
              echo "No changes in C/C++ files for clang-tidy"
            fi
          else
            echo "No C/C++ files changed for clang-tidy"
          fi