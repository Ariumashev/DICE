name: CI Checks

on:
  pull_request:
    # branches: [ main ]
  push:
    # branches: [ main ]

jobs:
  clang-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            python3
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            liblua5.3-dev

      - name: Configure project (generate compile_commands.json)
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja

      - name: Build project
        run: |
          cmake --build build

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(cpp|cc|cxx|hpp|h)$' > changed_files.txt || true

          cat changed_files.txt

      - name: Run clang-format check
        run: |
          if [ -s changed_files.txt ]; then
            while read file; do
              clang-format --style=file "$file" | diff -u "$file" - || exit 1
            done < changed_files.txt
          else
            echo "No C/C++ files changed"
          fi

      - name: Run clang-tidy on changed lines
        run: |
          wget https://raw.githubusercontent.com/llvm/llvm-project/main/clang-tools-extra/clang-tidy/tool/clang-tidy-diff.py

          git diff -U0 origin/${{ github.base_ref }}...HEAD \
            | python3 clang-tidy-diff.py \
              -p1 \
              -path build \
              -extra-arg=-std=c++20