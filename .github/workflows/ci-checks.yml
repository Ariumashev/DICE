name: CI Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  clang-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            python3 \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            liblua5.3-dev

      - name: Configure project
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja

      - name: Build project
        run: |
          cmake --build build

      - name: Get changed C/C++ files
        id: changed_files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -E '\.(cpp|cc|cxx|hpp|h)$' > changed_files.txt || true
          else
            git diff --name-only HEAD~1 \
              | grep -E '\.(cpp|cc|cxx|hpp|h)$' > changed_files.txt || true
          fi

          echo "Changed files:"
          cat changed_files.txt || true

      - name: Run clang-format
        run: |
          if [ -s changed_files.txt ]; then
            while read file; do
              echo "Checking format: $file"
              clang-format --style=file "$file" | diff -u "$file" - || exit 1
            done < changed_files.txt
          else
            echo "No C/C++ files changed"
          fi

      - name: Download clang-tidy-diff
        run: |
          wget https://raw.githubusercontent.com/llvm/llvm-project/main/clang-tools-extra/clang-tidy/tool/clang-tidy-diff.py

      - name: Run clang-tidy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff -U0 origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            git diff -U0 HEAD~1 > diff.txt
          fi

          cat diff.txt | python3 clang-tidy-diff.py \
            -p1 \
            -path build \
            -extra-arg=-std=c++20